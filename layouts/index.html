{{ define "main" }}
<section class="hero">
  <div class="hero-deco dc1"></div>
  <div class="hero-deco dc2"></div>
  <div class="hero-inner">
    <p class="hero-subtitle">My Japan Travel Journey</p>
    <h1 class="hero-title">日本を<span>めぐる</span><br>旅の記録</h1>
    <p class="hero-desc">47都道府県をすべて訪れることを目指して<br>日本各地の風景・食・人・文化を記録しています</p>
    <div class="hero-stats">
      <div class="stat">
        <div class="stat-num" id="visitedCount">0</div>
        <div class="stat-label">訪問自治体数</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num">1,724</div>
        <div class="stat-label">全自治体数</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num">47</div>
        <div class="stat-label">累計旅行回数</div>
      </div>
    </div>
    <div class="hero-cta">
      <a href="{{ .Site.BaseURL }}map/" class="btn-primary">旅マップを見る</a>
      <a href="/posts/" class="btn-ghost">旅行記を読む</a>
    </div>
  </div>
</section>
<script>
try {
  const saved = localStorage.getItem("visited_municipalities");
  if (saved) {
    const count = JSON.parse(saved).length;
    document.getElementById("visitedCount").textContent = count.toLocaleString();
  }
} catch(e) {}
</script>
{{ end }}
