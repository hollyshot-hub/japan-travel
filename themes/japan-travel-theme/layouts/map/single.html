{{ define "main" }}
<section class="map-page">
  <div class="map-header">
    <div class="map-header-inner">
      <p class="section-kana">TRAVEL MAP</p>
      <h1 class="section-title">訪問マップ</h1>
      <div class="section-line"></div>
      <p class="map-hint" id="mapHint">都道府県をタップしてください</p>
    </div>
    <div class="map-progress-wrap">
      <div class="map-progress-bar"><div class="map-progress-fill" id="progressFill"></div></div>
      <p class="map-progress-text" id="progressText">読み込み中...</p>
    </div>
  </div>
  <div class="map-stage">
    <div id="back-btn-wrap" style="display:none;padding:10px 16px">
      <button class="back-btn" onclick="showPrefView()">← 都道府県一覧へ戻る</button>
    </div>
    <div id="map" style="height:600px;width:100%"></div>
  </div>
  <div class="map-legend">
    <div class="legend-item"><div class="legend-dot dot-unvisited"></div>未訪問</div>
    <div class="legend-item"><div class="legend-dot dot-visited"></div>訪問済み</div>
    <div class="legend-item"><div class="legend-dot dot-article"></div>旅行記あり</div>
  </div>
  <div class="map-export-wrap">
    <button class="btn-primary" onclick="exportVisited()">訪問データをコピー</button>
    <p class="map-export-note">コピーしたデータをdata/visited.jsonに貼り付けると記録が保存されます</p>
  </div>
</section>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 訪問済みデータ（data/visited.jsonから読み込む想定）
const VISITED_MUNI = {{ if .Site.Data.visited }}{{ .Site.Data.visited.municipalities | jsonify }}{{ else }}[]{{ end }};
const ARTICLE_MUNI = {{ if .Site.Data.visited }}{{ .Site.Data.visited.articles | jsonify }}{{ else }}{}{{ end }};

let map, currentLayer, prefLayer, muniLayer;
let visitedSet = new Set(VISITED_MUNI);
let currentPref = null;

// 地図初期化
map = L.map('map', {
  center: [36.5, 136.0],
  zoom: 5,
  zoomControl: true
});

L.tileLayer('', {}).addTo(map);

// 都道府県GeoJSON読み込み
fetch('https://raw.githubusercontent.com/dataofjapan/land/master/japan.geojson')
  .then(r => r.json())
  .then(data => {
    drawPrefMap(data);
    updateProgress();
  })
  .catch(() => {
    document.getElementById('mapHint').textContent = 'データの読み込みに失敗しました。ネットワークをご確認ください。';
  });

function getColor(name, type) {
  if (type === 'pref') {
    return visitedSet.has(name) ? '#c0392b' : '#f0ebe0';
  }
  if (visitedSet.has(name)) return 'rgba(192,57,43,0.7)';
  return '#f0ebe0';
}

function drawPrefMap(data) {
  if (prefLayer) map.removeLayer(prefLayer);
  const nameKey = findNameKey(data.features[0]);
  prefLayer = L.geoJSON(data, {
    style: f => ({
      fillColor: getColor(f.properties[nameKey], 'pref'),
      fillOpacity: 0.8,
      color: '#8a7060',
      weight: 1.2
    }),
    onEachFeature: (f, layer) => {
      const name = f.properties[nameKey];
      layer.bindTooltip(name, {permanent: false, direction: 'top'});
      layer.on('click', () => loadMuniMap(name));
    }
  }).addTo(map);
  map.fitBounds(prefLayer.getBounds());
  currentLayer = prefLayer;
}

function findNameKey(feature) {
  const keys = Object.keys(feature.properties);
  const candidates = ['nam_ja','name_ja','NAME_JA','N03_001'];
  for (const k of candidates) {
    if (keys.includes(k)) return k;
  }
  return keys[0];
}

function loadMuniMap(prefName) {
  currentPref = prefName;
  document.getElementById('mapHint').textContent = prefName + ' — 自治体をタップして訪問済みに登録';
  document.getElementById('back-btn-wrap').style.display = 'block';

  fetch(`https://raw.githubusercontent.com/dataofjapan/land/master/japan.geojson`)
    .then(r => r.json())
    .then(data => {
      const nameKey = findNameKey(data.features[0]);
      const prefFeatures = data.features.filter(f => (f.properties[nameKey]||'') === prefName);
      const muniKey = 'N03_004';

      if (prefLayer) map.removeLayer(prefLayer);
      if (muniLayer) map.removeLayer(muniLayer);

      muniLayer = L.geoJSON({type:'FeatureCollection', features: prefFeatures}, {
        style: f => {
          const name = f.properties[muniKey] || f.properties[nameKey] || '';
          return {
            fillColor: visitedSet.has(name) ? 'rgba(192,57,43,0.7)' : '#f0ebe0',
            fillOpacity: 0.85,
            color: '#9a8878',
            weight: 0.8
          };
        },
        onEachFeature: (f, layer) => {
          const name = f.properties[muniKey] || f.properties[nameKey] || '';
          layer.bindTooltip(name + (visitedSet.has(name) ? ' ✓' : ''), {permanent: false, direction: 'top'});
          layer.on('click', () => toggleVisited(name, layer));
        }
      }).addTo(map);
      map.fitBounds(muniLayer.getBounds());
      currentLayer = muniLayer;
    });
}

function toggleVisited(name, layer) {
  if (visitedSet.has(name)) {
    visitedSet.delete(name);
  } else {
    visitedSet.add(name);
  }
  layer.setStyle({
    fillColor: visitedSet.has(name) ? 'rgba(192,57,43,0.7)' : '#f0ebe0'
  });
  layer.setTooltipContent(name + (visitedSet.has(name) ? ' ✓' : ''));
  updateProgress();
  saveToStorage();
}

function showPrefView() {
  currentPref = null;
  document.getElementById('mapHint').textContent = '都道府県をタップしてください';
  document.getElementById('back-btn-wrap').style.display = 'none';
  if (muniLayer) map.removeLayer(muniLayer);
  fetch('https://raw.githubusercontent.com/dataofjapan/land/master/japan.geojson')
    .then(r => r.json())
    .then(data => drawPrefMap(data));
}

function updateProgress() {
  const count = visitedSet.size;
  document.getElementById('progressText').textContent = count + ' 自治体訪問済み';
  document.getElementById('progressFill').style.width = Math.min(count / 1724 * 100, 100) + '%';
}

function saveToStorage() {
  try {
    localStorage.setItem('visited_municipalities', JSON.stringify([...visitedSet]));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem('visited_municipalities');
    if (saved) {
      JSON.parse(saved).forEach(v => visitedSet.add(v));
    }
  } catch(e) {}
}

function exportVisited() {
  const data = JSON.stringify({municipalities: [...visitedSet], articles: ARTICLE_MUNI}, null, 2);
  navigator.clipboard.writeText(data).then(() => {
    alert('クリップボードにコピーしました。data/visited.jsonに貼り付けてください。');
  });
}

loadFromStorage();
updateProgress();
</script>
{{ end }}
